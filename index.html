<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB Surf</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sky-1: #060f17;
    --sky-2: #0a4f6e;
    --sky-accent: rgba(41,217,245,0.06);
  }
  body {
    background: var(--sky-1);
    color: #d8f0f7;
    font-family: -apple-system, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 40px;
    transition: background 8s ease;
    overflow-x: hidden;
  }
  /* Sky gradient layer - shifts through the day */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 100%, var(--sky-2) 0%, transparent 70%),
                radial-gradient(ellipse 60% 30% at 15% 10%, var(--sky-accent) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    transition: background 8s ease;
  }
  /* Animated water ripple layer at bottom */
  body::after {
    content: '';
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: -40px;
    width: 480px;
    height: 240px;
    max-width: 100vw;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 30% at 30% 70%, rgba(41,217,245,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 25% at 70% 80%, rgba(41,217,245,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,79,110,0.5) 0%, transparent 70%);
    animation: ripple 14s ease-in-out infinite;
    filter: blur(0.5px);
  }
  @keyframes ripple {
    0%, 100% {
      background-position: 0% 0%, 0% 0%, 0% 0%;
      opacity: 0.95;
    }
    33% {
      background-position: 12% -8%, -8% 6%, 0% 0%;
      opacity: 1;
    }
    66% {
      background-position: -8% 6%, 10% -4%, 0% 0%;
      opacity: 0.9;
    }
  }
  /* Subtle horizontal wave lines that drift across */
  .sea-lines {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 180px;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    opacity: 0.4;
  }
  .sea-line {
    position: absolute;
    left: -20%;
    right: -20%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(41,217,245,0.25) 30%, rgba(41,217,245,0.4) 50%, rgba(41,217,245,0.25) 70%, transparent 100%);
    animation: drift linear infinite;
  }
  .sea-line:nth-child(1) { bottom: 30px;  animation-duration: 18s; opacity: 0.5; }
  .sea-line:nth-child(2) { bottom: 60px;  animation-duration: 24s; opacity: 0.35; }
  .sea-line:nth-child(3) { bottom: 95px;  animation-duration: 30s; opacity: 0.25; }
  .sea-line:nth-child(4) { bottom: 135px; animation-duration: 38s; opacity: 0.15; }
  @keyframes drift {
    0%   { transform: translateX(-30%) scaleX(1); }
    50%  { transform: translateX(0%)   scaleX(1.05); }
    100% { transform: translateX(30%)  scaleX(1); }
  }
  .wrap { position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px 18px 0; }
  .logo { font-size: 34px; font-weight: 900; letter-spacing: 3px; }
  .logo span { color: #29d9f5; }
  .clock { font-family: monospace; font-size: 11px; color: rgba(216,240,247,0.4); text-align: right; line-height: 1.6; }
  .sec { padding: 14px 18px 6px; font-family: monospace; font-size: 9px; letter-spacing: 3px; color: rgba(216,240,247,0.25); text-transform: uppercase; }

  .ov-row { display: flex; gap: 8px; padding: 0 18px; overflow-x: auto; scrollbar-width: none; }
  .ov-row::-webkit-scrollbar { display: none; }
  .ov-chip { flex-shrink: 0; min-width: 80px; padding: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(216,240,247,0.09); border-radius: 6px; cursor: pointer; transition: border-color 0.2s; }
  .ov-chip.active { border-color: #29d9f5; background: rgba(41,217,245,0.07); }
  .ov-short { font-family: monospace; font-size: 9px; letter-spacing: 2px; color: rgba(216,240,247,0.45); margin-bottom: 4px; }
  .ov-ht { font-size: 20px; font-weight: 800; line-height: 1; }
  .ov-rt { font-family: monospace; font-size: 8px; margin-top: 3px; }

  .tabs { display: flex; gap: 6px; padding: 0 18px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 13px; border-radius: 4px; border: 1px solid rgba(216,240,247,0.1); background: transparent; color: rgba(216,240,247,0.4); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .tab.active { background: #29d9f5; color: #060f17; border-color: #29d9f5; }

  .card { margin: 10px 18px 0; background: rgba(255,255,255,0.035); border: 1px solid rgba(216,240,247,0.09); border-radius: 8px; overflow: hidden; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 16px 12px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .spot-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
  .src-badge { font-family: monospace; font-size: 8px; letter-spacing: 1px; color: rgba(216,240,247,0.25); margin-top: 3px; }
  .rating-pill { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; padding: 4px 9px; border-radius: 3px; border: 1px solid currentColor; }

  .hero { display: grid; grid-template-columns: auto 1fr; gap: 0 16px; padding: 14px 16px 12px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .wave-big { font-size: 58px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
  .wave-unit { font-size: 16px; color: rgba(216,240,247,0.4); }
  .wave-human { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.4); margin-top: 3px; }
  .swell-col { display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .swell-row { display: flex; align-items: center; gap: 6px; }
  .sw-l { font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.3); width: 26px; }
  .sw-v { font-family: monospace; font-size: 11px; color: #29d9f5; }
  .sw-d { font-size: 9px; color: rgba(216,240,247,0.4); }

  .dgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .dcell { padding: 12px 14px; border-right: 1px solid rgba(216,240,247,0.07); }
  .dcell:last-child { border-right: none; }
  .dl { font-family: monospace; font-size: 8px; letter-spacing: 1.5px; color: rgba(216,240,247,0.3); text-transform: uppercase; margin-bottom: 4px; }
  .dv { font-size: 18px; font-weight: 800; line-height: 1; }
  .du { font-size: 10px; color: rgba(216,240,247,0.35); }
  .ds { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.38); margin-top: 3px; }

  .tides-sec { padding: 12px 16px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .tide-bar { position: relative; height: 24px; margin: 8px 0 10px; }
  .tb-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .tb-fill { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg,#0a4f6e,#29d9f5); border-radius: 2px; transition: width 1s ease; }
  .tb-dot { position: absolute; bottom: -2.5px; width: 8px; height: 8px; background: #29d9f5; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 8px #29d9f5; }
  .tide-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .tt { font-family: monospace; font-size: 9px; letter-spacing: 1px; }
  .ttv { font-size: 15px; font-weight: 800; }
  .tht { font-family: monospace; font-size: 10px; color: rgba(216,240,247,0.45); }

  .hourly-sec { padding: 12px 16px; }
  .day-strip { padding: 12px 16px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .day-canvas { position: relative; height: 110px; margin-top: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; }
  .day-svg { width: 100%; height: 100%; display: block; }
  .day-labels { display: flex; justify-content: space-between; margin-top: 4px; font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.4); letter-spacing: 1px; }
  .day-legend { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.5); letter-spacing: 0.5px; }
  .legend-dot { width: 8px; height: 3px; border-radius: 1px; }
  .legend-line { width: 12px; height: 1.5px; }
  .hscroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  .hchip { flex-shrink: 0; width: 58px; padding: 9px 0; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(216,240,247,0.07); border-radius: 4px; }
  .hchip.now { border-color: #29d9f5; background: rgba(41,217,245,0.06); }
  .h-t { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.35); margin-bottom: 4px; }
  .h-h { font-size: 15px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
  .h-w { font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.35); }
  .h-d { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; }

  .loading { padding: 40px; text-align: center; }
  .spin { width: 28px; height: 28px; border: 2px solid rgba(41,217,245,0.15); border-top-color: #29d9f5; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-lbl { font-family: monospace; font-size: 10px; letter-spacing: 2px; color: rgba(216,240,247,0.3); }
  .err { padding: 16px; font-family: monospace; font-size: 10px; color: #e05e3a; line-height: 1.6; }
</style>
</head>
<body>
<div class="sea-lines"><div class="sea-line"></div><div class="sea-line"></div><div class="sea-line"></div><div class="sea-line"></div></div>
<div class="wrap">
  <header>
    <div class="logo">SB<span>·</span>SURF</div>
    <div class="clock" id="clock"></div>
  </header>
  <div class="sec">Overview</div>
  <div class="ov-row" id="ovRow"></div>
  <div class="sec">Detail</div>
  <div class="tabs" id="tabs"></div>
  <div id="cardWrap"></div>
</div>

<script>
// ─── SPOTS ───────────────────────────────────────────────────────────────────
// multiplier: how this spot's actual surf height compares to offshore model
// based on local exposure, shadowing, submarine canyon effects etc.
const SPOTS = [
  { name:"BRUCE'S",   short:"BRU", slId:"61c376003cf37564c0eb8125", lat:33.8988, lon:-118.4152, mult:0.85 },
  { name:"MAN PIER",  short:"MAN", slId:"5842041f4e65fad6a7708907", lat:33.8843, lon:-118.4090, mult:0.80 },
  { name:"HERMOSA",   short:"HER", slId:"5b17281e4a274e001a11fcc3", lat:33.8619, lon:-118.4002, mult:0.82 },
  { name:"RAT BEACH", short:"RAT", slId:"640a3f804eb375e33a945550", lat:33.8110, lon:-118.3942, mult:0.90 },
  { name:"TOPAZ",     short:"TOP", slId:"584204214e65fad6a7709d0b", lat:33.8412, lon:-118.3996, mult:0.55 },
  { name:"EL PORTO",  short:"POR", slId:"5842041f4e65fad6a7708906", lat:33.9020, lon:-118.4180, mult:0.95 },
];
const NOAA_STATION = "9410660";

let active = 0;
const cache = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rc(r='') {
  const l = r.toLowerCase();
  if (l.includes('epic'))  return '#29d9f5';
  if (l.includes('good'))  return '#3dbe7a';
  if (l.includes('fair'))  return '#e8b84b';
  if (l === 'flat')        return 'rgba(216,240,247,0.3)';
  return '#e05e3a';
}
function wdir(deg) {
  if (deg==null) return '–';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}
// South Bay faces WSW. Wind blowing FROM NE/E/N = offshore (good).
// Wind blowing FROM W/SW/S = onshore (bad). SE/NW = cross-shore.
function windLabel(deg, speedKt) {
  if (deg==null || speedKt===0) return 'CALM';
  if (speedKt < 4) return 'LIGHT';
  // deg is direction wind is coming FROM
  // offshore for South Bay = NE quadrant (0–135°)
  if (deg >= 0   && deg < 45)  return 'OFFSHORE';   // N
  if (deg >= 45  && deg < 135) return 'OFFSHORE';   // NE/E
  if (deg >= 135 && deg < 170) return 'CROSS-SHORE'; // SE
  if (deg >= 170 && deg < 260) return 'ONSHORE';    // S/SW
  if (deg >= 260 && deg < 290) return 'ONSHORE';    // W
  if (deg >= 290 && deg < 340) return 'CROSS-SHORE'; // NW
  return 'OFFSHORE'; // NNW back toward offshore
}
function windLabelColor(label) {
  if (label==='OFFSHORE')    return '#3dbe7a';
  if (label==='ONSHORE')     return '#e05e3a';
  if (label==='CROSS-SHORE') return '#e8b84b';
  if (label==='CALM')        return '#3dbe7a';  // calm = great, treat like offshore
  if (label==='LIGHT')       return '#3dbe7a';  // light wind = good
  return '#3dbe7a';
}
function humanHt(m) {
  if (m<0.3)  return 'flat';
  if (m<0.6)  return 'ankle';
  if (m<0.9)  return 'knee–thigh';
  if (m<1.2)  return 'thigh–waist';
  if (m<1.7)  return 'waist–chest';
  if (m<2.1)  return 'chest–head';
  if (m<2.7)  return 'overhead';
  return 'double+';
}
function mToFt(m) { return (m*3.28084).toFixed(1); }
function msToKt(ms) { return Math.round(ms*1.94384); }
function fmtDate(d) { return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function tomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return d; }
function fmtTime(s) { return new Date(s).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function fmtHour(s) { return new Date(s).toLocaleTimeString('en-US',{hour:'numeric',hour12:true}); }
function fmtHourDay(s) {
  const d = new Date(s);
  const today = new Date().toDateString();
  const prefix = d.toDateString() !== today ? 'tmrw ' : '';
  return prefix + d.toLocaleTimeString('en-US',{hour:'numeric',hour12:true});
}
function getNowIdx(times) {
  const now = new Date().toISOString().slice(0,13);
  let best=0;
  times.forEach((t,i)=>{ if(t.slice(0,13)<=now) best=i; });
  return best;
}
function ratingStr(waveM, periodS, windMs) {
  const ft=waveM*3.28084, kt=windMs*1.94384;
  if (ft<0.3) return 'FLAT';
  if (kt>22)  return 'POOR';
  if (ft>=3 && periodS>=12 && kt<8)  return 'GOOD';
  if (ft>=2 && periodS>=10 && kt<10) return 'FAIR TO GOOD';
  if (ft>=1 && periodS>=8  && kt<15) return 'FAIR';
  if (kt>15)  return 'POOR TO FAIR';
  return 'POOR';
}

// ─── CORS PROXY FETCH ────────────────────────────────────────────────────────
// Tries allorigins first, then corsproxy as fallback
async function proxiedJSON(url) {
  const encoded = encodeURIComponent(url);
  // Try allorigins
  try {
    const r = await fetch(`https://api.allorigins.win/raw?url=${encoded}`, {signal: AbortSignal.timeout(6000)});
    if (r.ok) return await r.json();
  } catch {}
  // Fallback: corsproxy.io
  try {
    const r = await fetch(`https://corsproxy.io/?url=${encoded}`, {signal: AbortSignal.timeout(6000)});
    if (r.ok) return await r.json();
  } catch {}
  return null;
}

// ─── FETCH SURFLINE (via proxy) ───────────────────────────────────────────────
async function fetchSurfline(spotId) {
  const base = 'https://services.surfline.com/kbyg/spots/forecasts';
  const p = `?spotId=${spotId}&days=2&intervalHours=3&cacheEnabled=true&units%5BswellHeight%5D=FT&units%5BwaveHeight%5D=FT&units%5BwindSpeed%5D=KTS&units%5BtideHeight%5D=FT`;
  const [wave, cond] = await Promise.allSettled([
    proxiedJSON(base+'/wave'+p),
    proxiedJSON(base+'/conditions'+p),
  ]);
  return {
    wave: wave.status==='fulfilled' ? wave.value : null,
    cond: cond.status==='fulfilled' ? cond.value : null,
  };
}

// ─── FETCH OPEN-METEO (no CORS) ──────────────────────────────────────────────
async function fetchOpenMeteo(lat, lon) {
  const marine = await fetch(
    `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,swell_wave_height,swell_wave_period,swell_wave_direction&timezone=America%2FLos_Angeles&forecast_days=3`
  ).then(r=>r.json());
  const wind = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms&timezone=America%2FLos_Angeles&forecast_days=3`
  ).then(r=>r.json());
  return { marine, wind };
}

// ─── FETCH NOAA TIDES (no CORS) ──────────────────────────────────────────────
async function fetchTides() {
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=${NOAA_STATION}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=sb_surf&format=json&begin_date=${fmtDate(new Date())}&end_date=${fmtDate(tomorrow())}`;
  try { return (await fetch(url).then(r=>r.json())).predictions || []; }
  catch { return []; }
}

// ─── MASTER FETCH ─────────────────────────────────────────────────────────────
async function fetchAll(idx) {
  if (cache[idx]) return cache[idx];
  const s = SPOTS[idx];
  const [sl, om, tides] = await Promise.allSettled([
    fetchSurfline(s.slId),
    fetchOpenMeteo(s.lat, s.lon),
    fetchTides(),
  ]);
  cache[idx] = {
    sl:    sl.status==='fulfilled'    ? sl.value    : null,
    om:    om.status==='fulfilled'    ? om.value    : null,
    tides: tides.status==='fulfilled' ? tides.value : [],
    mult:  s.mult,
  };
  return cache[idx];
}

// ─── SKY COLOR (shifts through the day) ──────────────────────────────────────
// Phases: pre-dawn -> dawn -> morning -> midday -> afternoon -> golden -> dusk -> night
function updateSky() {
  const now = new Date();
  const h = now.getHours() + now.getMinutes()/60;

  // Rough sunrise/sunset for South Bay LA (varies slightly by season but close enough)
  const month = now.getMonth(); // 0=Jan
  // Approximate sunrise/sunset by month
  const sunriseByMonth = [6.93, 6.67, 6.20, 5.55, 5.02, 4.78, 4.92, 5.30, 5.72, 6.13, 6.55, 6.92];
  const sunsetByMonth  = [16.93, 17.45, 17.95, 18.42, 18.83, 19.13, 19.13, 18.78, 18.13, 17.43, 16.83, 16.65];
  const sunrise = sunriseByMonth[month];
  const sunset  = sunsetByMonth[month];

  let sky1, sky2, accent;

  if (h < sunrise - 1) {
    // Deep night
    sky1 = '#020812'; sky2 = '#051a2a'; accent = 'rgba(41,217,245,0.04)';
  } else if (h < sunrise) {
    // Pre-dawn - violet/indigo glow
    const f = (h - (sunrise-1)) / 1; // 0..1
    sky1 = lerpColor('#020812','#1a1238', f);
    sky2 = lerpColor('#051a2a','#3d2658', f);
    accent = 'rgba(180,120,200,0.08)';
  } else if (h < sunrise + 1) {
    // Dawn - pink/orange
    const f = (h - sunrise) / 1;
    sky1 = lerpColor('#1a1238','#241620', f);
    sky2 = lerpColor('#3d2658','#c66442', f);
    accent = 'rgba(255,150,90,0.18)';
  } else if (h < sunrise + 2.5) {
    // Early morning - warming up
    const f = (h - (sunrise+1)) / 1.5;
    sky1 = lerpColor('#241620','#091e30', f);
    sky2 = lerpColor('#c66442','#1880b0', f);
    accent = lerpColor('rgba(255,150,90,0.18)','rgba(41,217,245,0.10)', f);
  } else if (h < sunset - 2.5) {
    // Day - bright blue
    sky1 = '#061520'; sky2 = '#1880b0'; accent = 'rgba(41,217,245,0.10)';
  } else if (h < sunset - 1) {
    // Late afternoon - warming
    const f = (h - (sunset-2.5)) / 1.5;
    sky1 = lerpColor('#061520','#1a1418', f);
    sky2 = lerpColor('#1880b0','#c4783c', f);
    accent = lerpColor('rgba(41,217,245,0.10)','rgba(255,150,80,0.15)', f);
  } else if (h < sunset) {
    // Golden hour
    const f = (h - (sunset-1)) / 1;
    sky1 = lerpColor('#1a1418','#2a0e1a', f);
    sky2 = lerpColor('#c4783c','#d04060', f);
    accent = 'rgba(255,120,80,0.25)';
  } else if (h < sunset + 1) {
    // Dusk - deep purple/red
    const f = (h - sunset) / 1;
    sky1 = lerpColor('#2a0e1a','#0a0820', f);
    sky2 = lerpColor('#d04060','#2a1850', f);
    accent = lerpColor('rgba(255,120,80,0.25)','rgba(120,80,180,0.10)', f);
  } else if (h < sunset + 2) {
    // Twilight to night
    const f = (h - (sunset+1)) / 1;
    sky1 = lerpColor('#0a0820','#020812', f);
    sky2 = lerpColor('#2a1850','#051a2a', f);
    accent = lerpColor('rgba(120,80,180,0.10)','rgba(41,217,245,0.04)', f);
  } else {
    // Night
    sky1 = '#020812'; sky2 = '#051a2a'; accent = 'rgba(41,217,245,0.04)';
  }

  document.documentElement.style.setProperty('--sky-1', sky1);
  document.documentElement.style.setProperty('--sky-2', sky2);
  document.documentElement.style.setProperty('--sky-accent', accent);
}

function lerpColor(a, b, t) {
  // Handle rgba() interpolation
  if (a.startsWith('rgba') || b.startsWith('rgba')) {
    const pa = parseRgba(a), pb = parseRgba(b);
    const r = Math.round(pa[0] + (pb[0]-pa[0])*t);
    const g = Math.round(pa[1] + (pb[1]-pa[1])*t);
    const bl = Math.round(pa[2] + (pb[2]-pa[2])*t);
    const al = pa[3] + (pb[3]-pa[3])*t;
    return `rgba(${r},${g},${bl},${al.toFixed(3)})`;
  }
  const pa = parseHex(a), pb = parseHex(b);
  const r = Math.round(pa[0] + (pb[0]-pa[0])*t);
  const g = Math.round(pa[1] + (pb[1]-pa[1])*t);
  const bl = Math.round(pa[2] + (pb[2]-pa[2])*t);
  return `#${[r,g,bl].map(x=>x.toString(16).padStart(2,'0')).join('')}`;
}
function parseHex(h) {
  const s = h.replace('#','');
  return [parseInt(s.slice(0,2),16), parseInt(s.slice(2,4),16), parseInt(s.slice(4,6),16)];
}
function parseRgba(s) {
  const m = s.match(/rgba?\(([^)]+)\)/);
  if (!m) return [0,0,0,1];
  const parts = m[1].split(',').map(x=>parseFloat(x.trim()));
  return [parts[0]||0, parts[1]||0, parts[2]||0, parts[3]!=null?parts[3]:1];
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function tick() {
  const n=new Date();
  document.getElementById('clock').innerHTML =
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'<br>'+
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  updateSky();
}
tick(); setInterval(tick,30000);

// ─── BUILD TABS + OVERVIEW ────────────────────────────────────────────────────
const tabsEl = document.getElementById('tabs');
const ovEl   = document.getElementById('ovRow');

SPOTS.forEach((s,i) => {
  const t = document.createElement('button');
  t.className='tab'+(i===0?' active':'');
  t.textContent=s.name;
  t.onclick=()=>select(i);
  tabsEl.appendChild(t);

  const c=document.createElement('div');
  c.className='ov-chip'+(i===0?' active':'');
  c.id='ov-'+i;
  c.innerHTML=`<div class="ov-short">${s.short}</div><div class="ov-ht" id="ovht-${i}"><span style="opacity:0.3;font-size:12px">···</span></div><div class="ov-rt" id="ovrt-${i}"></div>`;
  c.onclick=()=>select(i);
  ovEl.appendChild(c);
});

// Load overview for all spots in background
SPOTS.forEach(async (s,i) => {
  try {
    const d = await fetchAll(i);
    let ftVal, rat;

    // Prefer Surfline wave height
    const slWaves = d.sl?.wave?.data?.wave;
    if (slWaves?.length) {
      const now=Date.now()/1000;
      const cur=slWaves.reduce((a,b)=>Math.abs(b.timestamp-now)<Math.abs(a.timestamp-now)?b:a);
      const ht=cur.surf;
      ftVal=`${ht.min}–${ht.max}`;
      rat = d.sl?.cond?.data?.conditions?.value || cur.surf.humanRelation || '';
    } else if (d.om?.marine?.hourly) {
      // Fallback: Open-Meteo with multiplier
      const h=d.om.marine.hourly;
      const idx2=getNowIdx(h.time);
      const raw=h.wave_height[idx2]||0;
      const adj=raw*d.mult;
      ftVal=mToFt(adj);
      const wp=h.swell_wave_period?.[idx2]||0;
      const ws=d.om.wind?.hourly?.wind_speed_10m?.[idx2]||0;
      rat=ratingStr(adj,wp,ws);
    }

    if (ftVal) {
      document.getElementById('ovht-'+i).innerHTML=ftVal+'<span style="font-size:10px;color:rgba(216,240,247,0.35)">ft</span>';
      const rtEl=document.getElementById('ovrt-'+i);
      rtEl.textContent=(rat||'').toUpperCase();
      rtEl.style.color=rc(rat||'');
    }
  } catch {}
});

// ─── SELECT ───────────────────────────────────────────────────────────────────
function select(i) {
  active=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.ov-chip').forEach((c,j)=>c.classList.toggle('active',j===i));
  renderCard(i);
}

// ─── RENDER CARD ─────────────────────────────────────────────────────────────
async function renderCard(idx) {
  const wrap=document.getElementById('cardWrap');
  wrap.innerHTML=`<div class="card"><div class="loading"><div class="spin"></div><div class="spin-lbl">LOADING</div></div></div>`;
  try {
    const d   = await fetchAll(idx);
    const sp  = SPOTS[idx];
    const now = Date.now()/1000;

    // ── Wave height: Surfline preferred, Open-Meteo fallback ──
    let htStr, htM, swellFt, swellPd, swellDirDeg, rating, dataSource;

    const slWaves = d.sl?.wave?.data?.wave;
    if (slWaves?.length) {
      const cur = slWaves.reduce((a,b)=>Math.abs(b.timestamp-now)<Math.abs(a.timestamp-now)?b:a);
      htStr      = `${cur.surf.min}–${cur.surf.max}`;
      htM        = ((cur.surf.min+cur.surf.max)/2) / 3.28084; // approx meters for humanHt
      const sw   = (cur.swells||[]).filter(s=>s.height>0)[0];
      swellFt    = sw ? sw.height.toFixed(1) : null;
      swellPd    = sw ? sw.period : null;
      swellDirDeg= sw ? sw.direction : null;
      rating     = d.sl?.cond?.data?.conditions?.value || cur.surf.humanRelation || '';
      dataSource = 'SURFLINE';
    } else if (d.om?.marine?.hourly) {
      const h    = d.om.marine.hourly;
      const ni   = getNowIdx(h.time);
      const rawM = h.wave_height[ni]||0;
      htM        = rawM * d.mult;
      htStr      = mToFt(htM);
      const rawSw= (h.swell_wave_height[ni]||0)*d.mult;
      swellFt    = mToFt(rawSw);
      swellPd    = h.swell_wave_period?.[ni]||null;
      swellDirDeg= h.swell_wave_direction?.[ni]||null;
      const ws   = d.om.wind?.hourly?.wind_speed_10m?.[ni]||0;
      rating     = ratingStr(htM, swellPd||0, ws);
      dataSource = 'OPEN-METEO';
    } else {
      throw new Error('No wave data available');
    }

    // ── Wind: Open-Meteo (more reliable) ──
    let windKt=0, windDirStr='–', gustKt=0, windDirDeg=null, wLabel='–', wLabelColor='rgba(216,240,247,0.4)';
    if (d.om?.wind?.hourly) {
      const wh   = d.om.wind.hourly;
      const ni   = getNowIdx(wh.time);
      windDirDeg = wh.wind_direction_10m[ni];
      windKt     = msToKt(wh.wind_speed_10m[ni]||0);
      windDirStr = wdir(windDirDeg);
      gustKt     = msToKt(wh.wind_gusts_10m[ni]||0);
      wLabel     = windLabel(windDirDeg, windKt);
      wLabelColor= windLabelColor(wLabel);
    }

    // ── Tides: NOAA ──
    const tides    = d.tides || [];
    const upcoming = tides.filter(t=>new Date(t.t)>new Date()).slice(0,4);
    const past     = tides.filter(t=>new Date(t.t)<=new Date());
    const lastT    = past[past.length-1];
    const nextT    = tides.find(t=>new Date(t.t)>new Date());
    let tidePct=50;
    if (lastT&&nextT) {
      const nowD=new Date(), frac=(nowD-new Date(lastT.t))/(new Date(nextT.t)-new Date(lastT.t));
      const cur2=parseFloat(lastT.v)+(parseFloat(nextT.v)-parseFloat(lastT.v))*frac;
      const vals=tides.map(t=>parseFloat(t.v));
      tidePct=Math.min(100,Math.max(0,(cur2-Math.min(...vals))/(Math.max(...vals)-Math.min(...vals))*100));
    }

    // ── Hourly ──
    let hourSlots=[];
    if (d.om?.marine?.hourly) {
      const mh=d.om.marine.hourly, wh=d.om.wind?.hourly;
      const ni=getNowIdx(mh.time);
      const cutoff = new Date(mh.time[ni]);
      cutoff.setHours(cutoff.getHours() + 24);
      for (let i=ni;i<mh.time.length && new Date(mh.time[i])<=cutoff;i++) {
        const adjHt=(mh.wave_height[i]||0)*d.mult;
        hourSlots.push({
          time: mh.time[i],
          htM:  adjHt,
          ftStr:mToFt(adjHt),
          sp:   mh.swell_wave_period?.[i]||0,
          ws:   wh?.wind_speed_10m?.[i]||0,
          wd:   wh?.wind_direction_10m?.[i],
        });
      }
    }

    // ── DAILY TIMELINE: today's data sunrise to sunset ──
    // We pull a full day of hourly data and overlay wave / tide / wind quality
    let dayTimelineSvg = '';
    let bestWindow = null;
    if (d.om?.marine?.hourly && d.om?.wind?.hourly) {
      const mh=d.om.marine.hourly, wh=d.om.wind.hourly;
      const todayStr = new Date().toISOString().slice(0,10);
      // collect 24 hourly slots for today
      const slots = [];
      for (let i=0; i<mh.time.length; i++) {
        if (mh.time[i].slice(0,10) === todayStr) {
          slots.push({
            time:  mh.time[i],
            hour:  new Date(mh.time[i]).getHours(),
            ht:    (mh.wave_height[i]||0) * d.mult,
            sp:    mh.swell_wave_period?.[i] || 0,
            ws:    wh.wind_speed_10m?.[i] || 0,
            wd:    wh.wind_direction_10m?.[i],
          });
        }
      }

      if (slots.length > 0) {
        // SVG dims
        const W = 360, H = 92;
        const padL = 4, padR = 4, padT = 8, padB = 18;
        const innerW = W - padL - padR, innerH = H - padT - padB;

        // Wave height range
        const maxHt = Math.max(...slots.map(s=>s.ht), 0.5);
        const xStep = innerW / (slots.length - 1 || 1);
        const xAt = (i) => padL + i * xStep;
        const yAt = (h) => padT + innerH - (h / maxHt) * innerH;

        // Build wave area path
        const wavePts = slots.map((s,i) => `${xAt(i).toFixed(1)},${yAt(s.ht).toFixed(1)}`).join(' ');
        const waveArea = `M ${padL},${padT+innerH} L ${wavePts.replace(/ /g,' L ')} L ${(padL+innerW).toFixed(1)},${padT+innerH} Z`;
        const waveLine = `M ${wavePts.split(' ').join(' L ')}`;

        // Tide curve - interpolate from NOAA hilo predictions
        let tideLine = '';
        if (tides.length >= 2) {
          // Build smooth curve from tide events for today
          const dayStart = new Date(todayStr + 'T00:00:00');
          const dayEnd   = new Date(todayStr + 'T23:59:59');
          // include yesterday's last and tomorrow's first for smooth ends
          const relevantTides = tides.filter(t => {
            const td = new Date(t.t);
            return td >= new Date(dayStart.getTime() - 12*3600*1000) && td <= new Date(dayEnd.getTime() + 12*3600*1000);
          }).sort((a,b)=> new Date(a.t) - new Date(b.t));

          const tideVals = relevantTides.map(t => parseFloat(t.v));
          const minTide = Math.min(...tideVals);
          const maxTide = Math.max(...tideVals);
          const tideRange = maxTide - minTide || 1;

          // For each slot hour interpolate tide using cosine between bracketing extremes
          const tidePts = slots.map((s,i) => {
            const slotTime = new Date(s.time);
            const before = relevantTides.filter(t => new Date(t.t) <= slotTime).pop();
            const after  = relevantTides.find(t => new Date(t.t) > slotTime);
            let tideHt = (before && after) ? (() => {
              const f = (slotTime - new Date(before.t)) / (new Date(after.t) - new Date(before.t));
              const h0 = parseFloat(before.v), h1 = parseFloat(after.v);
              // cosine interpolation for smoother tide curve
              const cf = (1 - Math.cos(f * Math.PI)) / 2;
              return h0 + (h1 - h0) * cf;
            })() : (before ? parseFloat(before.v) : (after ? parseFloat(after.v) : 0));
            // Map tide to upper portion (tide is overlay, not main viz)
            const ty = padT + innerH - ((tideHt - minTide) / tideRange) * innerH * 0.9;
            return `${xAt(i).toFixed(1)},${ty.toFixed(1)}`;
          });
          tideLine = `M ${tidePts.join(' L ')}`;
        }

        // Wind quality dots along the bottom
        const dots = slots.map((s,i) => {
          const kt = msToKt(s.ws);
          const lbl = windLabel(s.wd, kt);
          const color = (lbl==='OFFSHORE'||lbl==='CALM'||lbl==='LIGHT') ? '#3dbe7a' :
                        lbl==='CROSS-SHORE' ? '#e8b84b' :
                        lbl==='ONSHORE' ? '#e05e3a' :
                        '#3dbe7a';
          return `<rect x="${(xAt(i)-2).toFixed(1)}" y="${(padT+innerH+2).toFixed(1)}" width="4" height="4" fill="${color}" rx="1"/>`;
        }).join('');

        // NOW marker
        const nowHour = new Date().getHours() + new Date().getMinutes()/60;
        const nowSlotIdx = slots.findIndex(s => s.hour >= Math.floor(nowHour));
        const nowX = nowSlotIdx >= 0 ? xAt(nowSlotIdx) : null;

        // Hour labels - show every 4hrs
        const labels = slots.filter((s,i) => i % 4 === 0).map(s =>
          (s.hour === 0 ? '12a' : s.hour < 12 ? s.hour+'a' : s.hour === 12 ? '12p' : (s.hour-12)+'p')
        );

        // Find best window - score each hour by ht*period - wind penalty
        let bestScore = -Infinity, bestIdx = 0;
        slots.forEach((s,i) => {
          const kt = msToKt(s.ws);
          const lbl = windLabel(s.wd, kt);
          const windBonus = lbl==='OFFSHORE' ? 3 : lbl==='ONSHORE' ? -kt*0.3 : 0;
          const score = (s.ht * 3.28084) * Math.min(s.sp, 14)/10 + windBonus;
          if (score > bestScore && s.hour >= 5 && s.hour <= 19) {
            bestScore = score;
            bestIdx = i;
          }
        });
        const bestSlot = slots[bestIdx];
        if (bestSlot && bestSlot.ht > 0.2) {
          const h = bestSlot.hour;
          const hStr = h === 0 ? '12am' : h < 12 ? h+'am' : h === 12 ? '12pm' : (h-12)+'pm';
          bestWindow = `${hStr} · ${mToFt(bestSlot.ht)}ft · ${windLabel(bestSlot.wd, msToKt(bestSlot.ws))}`;
        }

        dayTimelineSvg = `
          <svg class="day-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="waveGrad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#29d9f5" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#29d9f5" stop-opacity="0.05"/>
              </linearGradient>
            </defs>
            <path d="${waveArea}" fill="url(#waveGrad)"/>
            <path d="${waveLine}" fill="none" stroke="#29d9f5" stroke-width="1.5"/>
            ${tideLine ? `<path d="${tideLine}" fill="none" stroke="rgba(216,240,247,0.35)" stroke-width="1" stroke-dasharray="2,2"/>` : ''}
            ${dots}
            ${nowX !== null ? `<line x1="${nowX}" y1="${padT}" x2="${nowX}" y2="${padT+innerH}" stroke="#fff" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/><circle cx="${nowX}" cy="${padT}" r="3" fill="#fff"/>` : ''}
          </svg>
        `;

        var dayLabelsHtml = '<div class="day-labels">' + labels.map(l => `<span>${l}</span>`).join('') + '</div>';
        var dayLegendHtml = `
          <div class="day-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#29d9f5"></div>WAVE HT</div>
            <div class="legend-item"><div class="legend-line" style="background:rgba(216,240,247,0.4);border-top:1px dashed"></div>TIDE</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3dbe7a"></div>OFFSHORE / CALM</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e8b84b"></div>CROSS</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e05e3a"></div>ONSHORE</div>
          </div>
        `;
        window.__dayHtml = dayLabelsHtml + dayLegendHtml;
      }
    }

    wrap.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="spot-title">${sp.name}</div>
          <div class="src-badge">${dataSource} · ${dataSource==='OPEN-METEO'?Math.round(d.mult*100)+'% NEARSHORE ADJ':'NEARSHORE MODEL'}</div>
        </div>
        <div class="rating-pill" style="color:${rc(rating)}">${(rating||'–').toUpperCase()}</div>
      </div>

      ${dayTimelineSvg ? `
      <div class="day-strip">
        <div class="dl">TODAY'S WINDOW${bestWindow ? ' · BEST: '+bestWindow : ''}</div>
        <div class="day-canvas">${dayTimelineSvg}</div>
        ${window.__dayHtml || ''}
      </div>` : ''}

      <div class="hero">
        <div>
          <div class="wave-big">${htStr}<span class="wave-unit">ft</span></div>
          <div class="wave-human">${humanHt(htM)}</div>
        </div>
        <div class="swell-col">
          ${swellFt ? `<div class="swell-row"><div class="sw-l">SWELL</div><div class="sw-v">${swellFt}ft @ ${swellPd?.toFixed?swellPd.toFixed(0):swellPd||'–'}s</div><div class="sw-d">${wdir(swellDirDeg)}</div></div>` : ''}
          <div class="swell-row"><div class="sw-l">WIND</div><div class="sw-v">${windKt}kt ${windDirStr}</div><div class="sw-d" style="color:${wLabelColor}">${wLabel}${gustKt?' ↑'+gustKt+'kt':''}</div></div>
        </div>
      </div>

      <div class="dgrid">
        <div class="dcell">
          <div class="dl">WIND</div>
          <div class="dv" style="font-size:13px;color:${wLabelColor}">${wLabel}</div>
          <div class="ds">${windKt}kt ${windDirStr}${gustKt?' gusts '+gustKt+'kt':''}</div>
        </div>
        <div class="dcell">
          <div class="dl">PERIOD</div>
          <div class="dv">${swellPd!=null?(typeof swellPd==='number'?swellPd.toFixed(0):swellPd):'–'}<span class="du">s</span></div>
          <div class="ds">${wdir(swellDirDeg)} swell</div>
        </div>
        <div class="dcell">
          <div class="dl">TIDE NOW</div>
          <div class="dv">${lastT?parseFloat(lastT.v).toFixed(1):'–'}<span class="du">ft</span></div>
          <div class="ds">${nextT?(new Date(nextT.t)>new Date()?'next '+(nextT.type==='H'?'high':'low'):''):'–'}</div>
        </div>
      </div>

      <div class="tides-sec">
        <div class="dl">TODAY'S TIDES — NOAA</div>
        <div class="tide-bar">
          <div class="tb-bg"></div>
          <div class="tb-fill" style="width:${tidePct}%"></div>
          <div class="tb-dot" style="left:${tidePct}%"></div>
        </div>
        ${upcoming.map(t=>`
          <div class="tide-row">
            <div class="tt" style="color:${t.type==='H'?'#29d9f5':'rgba(216,240,247,0.4)'}">${t.type==='H'?'HIGH':'LOW'}</div>
            <div class="ttv">${fmtTime(t.t)}</div>
            <div class="tht">${parseFloat(t.v).toFixed(1)} ft</div>
          </div>`).join('')||'<div style="font-family:monospace;font-size:10px;color:rgba(216,240,247,0.3)">No tide data</div>'}
      </div>

      <div class="hourly-sec">
        <div class="dl">NEXT 24 HRS</div>
        <div class="hscroll">
          ${hourSlots.map((h,i)=>`
            <div class="hchip ${i===0?'now':''}">
              <div class="h-t">${i===0?'NOW':fmtHourDay(h.time)}</div>
              <div class="h-h">${h.ftStr}ft</div>
              <div class="h-w">${msToKt(h.ws)}kt ${wdir(h.wd)}</div>
              <div class="h-d" style="background:${rc(ratingStr(h.htM,h.sp,h.ws))}"></div>
            </div>`).join('')||'<div style="font-family:monospace;font-size:10px;color:rgba(216,240,247,0.3)">–</div>'}
        </div>
      </div>
    </div>`;

  } catch(e) {
    wrap.innerHTML=`<div class="card"><div class="err">⚠ ${e.message}<br><br>Check your connection and reload.</div></div>`;
  }
}

renderCard(0);
</script>
</body>
