<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB Surf</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060f17;
    color: #d8f0f7;
    font-family: -apple-system, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,79,110,0.4) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px 18px 0; }
  .logo { font-size: 34px; font-weight: 900; letter-spacing: 3px; }
  .logo span { color: #29d9f5; }
  .clock { font-family: monospace; font-size: 11px; color: rgba(216,240,247,0.4); text-align: right; line-height: 1.6; }
  .sec { padding: 14px 18px 6px; font-family: monospace; font-size: 9px; letter-spacing: 3px; color: rgba(216,240,247,0.25); text-transform: uppercase; }

  .ov-row { display: flex; gap: 8px; padding: 0 18px; overflow-x: auto; scrollbar-width: none; }
  .ov-row::-webkit-scrollbar { display: none; }
  .ov-chip { flex-shrink: 0; min-width: 80px; padding: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(216,240,247,0.09); border-radius: 6px; cursor: pointer; transition: border-color 0.2s; }
  .ov-chip.active { border-color: #29d9f5; background: rgba(41,217,245,0.07); }
  .ov-short { font-family: monospace; font-size: 9px; letter-spacing: 2px; color: rgba(216,240,247,0.45); margin-bottom: 4px; }
  .ov-ht { font-size: 20px; font-weight: 800; line-height: 1; }
  .ov-rt { font-family: monospace; font-size: 8px; margin-top: 3px; }

  .tabs { display: flex; gap: 6px; padding: 0 18px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 13px; border-radius: 4px; border: 1px solid rgba(216,240,247,0.1); background: transparent; color: rgba(216,240,247,0.4); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .tab.active { background: #29d9f5; color: #060f17; border-color: #29d9f5; }

  .card { margin: 10px 18px 0; background: rgba(255,255,255,0.035); border: 1px solid rgba(216,240,247,0.09); border-radius: 8px; overflow: hidden; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 16px 12px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .spot-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
  .src-badge { font-family: monospace; font-size: 8px; letter-spacing: 1px; color: rgba(216,240,247,0.25); margin-top: 3px; }
  .rating-pill { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; padding: 4px 9px; border-radius: 3px; border: 1px solid currentColor; }

  .hero { display: grid; grid-template-columns: auto 1fr; gap: 0 16px; padding: 14px 16px 12px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .wave-big { font-size: 58px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
  .wave-unit { font-size: 16px; color: rgba(216,240,247,0.4); }
  .wave-human { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.4); margin-top: 3px; }
  .swell-col { display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .swell-row { display: flex; align-items: center; gap: 6px; }
  .sw-l { font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.3); width: 26px; }
  .sw-v { font-family: monospace; font-size: 11px; color: #29d9f5; }
  .sw-d { font-size: 9px; color: rgba(216,240,247,0.4); }

  .dgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .dcell { padding: 12px 14px; border-right: 1px solid rgba(216,240,247,0.07); }
  .dcell:last-child { border-right: none; }
  .dl { font-family: monospace; font-size: 8px; letter-spacing: 1.5px; color: rgba(216,240,247,0.3); text-transform: uppercase; margin-bottom: 4px; }
  .dv { font-size: 18px; font-weight: 800; line-height: 1; }
  .du { font-size: 10px; color: rgba(216,240,247,0.35); }
  .ds { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.38); margin-top: 3px; }

  .tides-sec { padding: 12px 16px; border-bottom: 1px solid rgba(216,240,247,0.07); }
  .tide-bar { position: relative; height: 24px; margin: 8px 0 10px; }
  .tb-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .tb-fill { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg,#0a4f6e,#29d9f5); border-radius: 2px; transition: width 1s ease; }
  .tb-dot { position: absolute; bottom: -2.5px; width: 8px; height: 8px; background: #29d9f5; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 8px #29d9f5; }
  .tide-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .tt { font-family: monospace; font-size: 9px; letter-spacing: 1px; }
  .ttv { font-size: 15px; font-weight: 800; }
  .tht { font-family: monospace; font-size: 10px; color: rgba(216,240,247,0.45); }

  .hourly-sec { padding: 12px 16px; }
  .hscroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  .hchip { flex-shrink: 0; width: 58px; padding: 9px 0; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(216,240,247,0.07); border-radius: 4px; }
  .hchip.now { border-color: #29d9f5; background: rgba(41,217,245,0.06); }
  .h-t { font-family: monospace; font-size: 9px; color: rgba(216,240,247,0.35); margin-bottom: 4px; }
  .h-h { font-size: 15px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
  .h-w { font-family: monospace; font-size: 8px; color: rgba(216,240,247,0.35); }
  .h-d { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; }

  .loading { padding: 40px; text-align: center; }
  .spin { width: 28px; height: 28px; border: 2px solid rgba(41,217,245,0.15); border-top-color: #29d9f5; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-lbl { font-family: monospace; font-size: 10px; letter-spacing: 2px; color: rgba(216,240,247,0.3); }
  .err { padding: 16px; font-family: monospace; font-size: 10px; color: #e05e3a; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SB<span>·</span>SURF</div>
    <div class="clock" id="clock"></div>
  </header>
  <div class="sec">Overview</div>
  <div class="ov-row" id="ovRow"></div>
  <div class="sec">Detail</div>
  <div class="tabs" id="tabs"></div>
  <div id="cardWrap"></div>
</div>

<script>
// ─── SPOTS ───────────────────────────────────────────────────────────────────
// multiplier: how this spot's actual surf height compares to offshore model
// based on local exposure, shadowing, submarine canyon effects etc.
const SPOTS = [
  { name:"BRUCE'S",   short:"BRU", slId:"61c376003cf37564c0eb8125", lat:33.8988, lon:-118.4152, mult:0.85 },
  { name:"MAN PIER",  short:"MAN", slId:"5842041f4e65fad6a7708907", lat:33.8843, lon:-118.4090, mult:0.80 },
  { name:"HERMOSA",   short:"HER", slId:"5b17281e4a274e001a11fcc3", lat:33.8619, lon:-118.4002, mult:0.82 },
  { name:"RAT BEACH", short:"RAT", slId:"640a3f804eb375e33a945550", lat:33.8110, lon:-118.3942, mult:0.90 },
  { name:"TOPAZ",     short:"TOP", slId:"584204214e65fad6a7709d0b", lat:33.8412, lon:-118.3996, mult:0.55 },
];
const NOAA_STATION = "9410660";

let active = 0;
const cache = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rc(r='') {
  const l = r.toLowerCase();
  if (l.includes('epic'))  return '#29d9f5';
  if (l.includes('good'))  return '#3dbe7a';
  if (l.includes('fair'))  return '#e8b84b';
  if (l === 'flat')        return 'rgba(216,240,247,0.3)';
  return '#e05e3a';
}
function wdir(deg) {
  if (deg==null) return '–';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}
function humanHt(m) {
  if (m<0.3)  return 'flat';
  if (m<0.6)  return 'ankle';
  if (m<0.9)  return 'knee–thigh';
  if (m<1.2)  return 'thigh–waist';
  if (m<1.7)  return 'waist–chest';
  if (m<2.1)  return 'chest–head';
  if (m<2.7)  return 'overhead';
  return 'double+';
}
function mToFt(m) { return (m*3.28084).toFixed(1); }
function msToKt(ms) { return Math.round(ms*1.94384); }
function fmtDate(d) { return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function tomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return d; }
function fmtTime(s) { return new Date(s).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function fmtHour(s) { return new Date(s).toLocaleTimeString('en-US',{hour:'numeric',hour12:true}); }
function getNowIdx(times) {
  const now = new Date().toISOString().slice(0,13);
  let best=0;
  times.forEach((t,i)=>{ if(t.slice(0,13)<=now) best=i; });
  return best;
}
function ratingStr(waveM, periodS, windMs) {
  const ft=waveM*3.28084, kt=windMs*1.94384;
  if (ft<0.3) return 'FLAT';
  if (kt>22)  return 'POOR';
  if (ft>=3 && periodS>=12 && kt<8)  return 'GOOD';
  if (ft>=2 && periodS>=10 && kt<10) return 'FAIR TO GOOD';
  if (ft>=1 && periodS>=8  && kt<15) return 'FAIR';
  if (kt>15)  return 'POOR TO FAIR';
  return 'POOR';
}

// ─── CORS PROXY FETCH ────────────────────────────────────────────────────────
// Tries allorigins first, then corsproxy as fallback
async function proxiedJSON(url) {
  const encoded = encodeURIComponent(url);
  // Try allorigins
  try {
    const r = await fetch(`https://api.allorigins.win/raw?url=${encoded}`, {signal: AbortSignal.timeout(6000)});
    if (r.ok) return await r.json();
  } catch {}
  // Fallback: corsproxy.io
  try {
    const r = await fetch(`https://corsproxy.io/?url=${encoded}`, {signal: AbortSignal.timeout(6000)});
    if (r.ok) return await r.json();
  } catch {}
  return null;
}

// ─── FETCH SURFLINE (via proxy) ───────────────────────────────────────────────
async function fetchSurfline(spotId) {
  const base = 'https://services.surfline.com/kbyg/spots/forecasts';
  const p = `?spotId=${spotId}&days=2&intervalHours=3&cacheEnabled=true&units%5BswellHeight%5D=FT&units%5BwaveHeight%5D=FT&units%5BwindSpeed%5D=KTS&units%5BtideHeight%5D=FT`;
  const [wave, cond] = await Promise.allSettled([
    proxiedJSON(base+'/wave'+p),
    proxiedJSON(base+'/conditions'+p),
  ]);
  return {
    wave: wave.status==='fulfilled' ? wave.value : null,
    cond: cond.status==='fulfilled' ? cond.value : null,
  };
}

// ─── FETCH OPEN-METEO (no CORS) ──────────────────────────────────────────────
async function fetchOpenMeteo(lat, lon) {
  const marine = await fetch(
    `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,swell_wave_height,swell_wave_period,swell_wave_direction&timezone=America%2FLos_Angeles&forecast_days=2`
  ).then(r=>r.json());
  const wind = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms&timezone=America%2FLos_Angeles&forecast_days=2`
  ).then(r=>r.json());
  return { marine, wind };
}

// ─── FETCH NOAA TIDES (no CORS) ──────────────────────────────────────────────
async function fetchTides() {
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=${NOAA_STATION}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=sb_surf&format=json&begin_date=${fmtDate(new Date())}&end_date=${fmtDate(tomorrow())}`;
  try { return (await fetch(url).then(r=>r.json())).predictions || []; }
  catch { return []; }
}

// ─── MASTER FETCH ─────────────────────────────────────────────────────────────
async function fetchAll(idx) {
  if (cache[idx]) return cache[idx];
  const s = SPOTS[idx];
  const [sl, om, tides] = await Promise.allSettled([
    fetchSurfline(s.slId),
    fetchOpenMeteo(s.lat, s.lon),
    fetchTides(),
  ]);
  cache[idx] = {
    sl:    sl.status==='fulfilled'    ? sl.value    : null,
    om:    om.status==='fulfilled'    ? om.value    : null,
    tides: tides.status==='fulfilled' ? tides.value : [],
    mult:  s.mult,
  };
  return cache[idx];
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function tick() {
  const n=new Date();
  document.getElementById('clock').innerHTML =
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'<br>'+
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,30000);

// ─── BUILD TABS + OVERVIEW ────────────────────────────────────────────────────
const tabsEl = document.getElementById('tabs');
const ovEl   = document.getElementById('ovRow');

SPOTS.forEach((s,i) => {
  const t = document.createElement('button');
  t.className='tab'+(i===0?' active':'');
  t.textContent=s.name;
  t.onclick=()=>select(i);
  tabsEl.appendChild(t);

  const c=document.createElement('div');
  c.className='ov-chip'+(i===0?' active':'');
  c.id='ov-'+i;
  c.innerHTML=`<div class="ov-short">${s.short}</div><div class="ov-ht" id="ovht-${i}"><span style="opacity:0.3;font-size:12px">···</span></div><div class="ov-rt" id="ovrt-${i}"></div>`;
  c.onclick=()=>select(i);
  ovEl.appendChild(c);
});

// Load overview for all spots in background
SPOTS.forEach(async (s,i) => {
  try {
    const d = await fetchAll(i);
    let ftVal, rat;

    // Prefer Surfline wave height
    const slWaves = d.sl?.wave?.data?.wave;
    if (slWaves?.length) {
      const now=Date.now()/1000;
      const cur=slWaves.reduce((a,b)=>Math.abs(b.timestamp-now)<Math.abs(a.timestamp-now)?b:a);
      const ht=cur.surf;
      ftVal=`${ht.min}–${ht.max}`;
      rat = d.sl?.cond?.data?.conditions?.value || cur.surf.humanRelation || '';
    } else if (d.om?.marine?.hourly) {
      // Fallback: Open-Meteo with multiplier
      const h=d.om.marine.hourly;
      const idx2=getNowIdx(h.time);
      const raw=h.wave_height[idx2]||0;
      const adj=raw*d.mult;
      ftVal=mToFt(adj);
      const wp=h.swell_wave_period?.[idx2]||0;
      const ws=d.om.wind?.hourly?.wind_speed_10m?.[idx2]||0;
      rat=ratingStr(adj,wp,ws);
    }

    if (ftVal) {
      document.getElementById('ovht-'+i).innerHTML=ftVal+'<span style="font-size:10px;color:rgba(216,240,247,0.35)">ft</span>';
      const rtEl=document.getElementById('ovrt-'+i);
      rtEl.textContent=(rat||'').toUpperCase();
      rtEl.style.color=rc(rat||'');
    }
  } catch {}
});

// ─── SELECT ───────────────────────────────────────────────────────────────────
function select(i) {
  active=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.ov-chip').forEach((c,j)=>c.classList.toggle('active',j===i));
  renderCard(i);
}

// ─── RENDER CARD ─────────────────────────────────────────────────────────────
async function renderCard(idx) {
  const wrap=document.getElementById('cardWrap');
  wrap.innerHTML=`<div class="card"><div class="loading"><div class="spin"></div><div class="spin-lbl">LOADING</div></div></div>`;
  try {
    const d   = await fetchAll(idx);
    const sp  = SPOTS[idx];
    const now = Date.now()/1000;

    // ── Wave height: Surfline preferred, Open-Meteo fallback ──
    let htStr, htM, swellFt, swellPd, swellDirDeg, rating, dataSource;

    const slWaves = d.sl?.wave?.data?.wave;
    if (slWaves?.length) {
      const cur = slWaves.reduce((a,b)=>Math.abs(b.timestamp-now)<Math.abs(a.timestamp-now)?b:a);
      htStr      = `${cur.surf.min}–${cur.surf.max}`;
      htM        = ((cur.surf.min+cur.surf.max)/2) / 3.28084; // approx meters for humanHt
      const sw   = (cur.swells||[]).filter(s=>s.height>0)[0];
      swellFt    = sw ? sw.height.toFixed(1) : null;
      swellPd    = sw ? sw.period : null;
      swellDirDeg= sw ? sw.direction : null;
      rating     = d.sl?.cond?.data?.conditions?.value || cur.surf.humanRelation || '';
      dataSource = 'SURFLINE';
    } else if (d.om?.marine?.hourly) {
      const h    = d.om.marine.hourly;
      const ni   = getNowIdx(h.time);
      const rawM = h.wave_height[ni]||0;
      htM        = rawM * d.mult;
      htStr      = mToFt(htM);
      const rawSw= (h.swell_wave_height[ni]||0)*d.mult;
      swellFt    = mToFt(rawSw);
      swellPd    = h.swell_wave_period?.[ni]||null;
      swellDirDeg= h.swell_wave_direction?.[ni]||null;
      const ws   = d.om.wind?.hourly?.wind_speed_10m?.[ni]||0;
      rating     = ratingStr(htM, swellPd||0, ws);
      dataSource = 'OPEN-METEO';
    } else {
      throw new Error('No wave data available');
    }

    // ── Wind: Open-Meteo (more reliable) ──
    let windKt=0, windDirStr='–', gustKt=0;
    if (d.om?.wind?.hourly) {
      const wh  = d.om.wind.hourly;
      const ni  = getNowIdx(wh.time);
      windKt    = msToKt(wh.wind_speed_10m[ni]||0);
      windDirStr= wdir(wh.wind_direction_10m[ni]);
      gustKt    = msToKt(wh.wind_gusts_10m[ni]||0);
    }

    // ── Tides: NOAA ──
    const tides    = d.tides || [];
    const upcoming = tides.filter(t=>new Date(t.t)>new Date()).slice(0,4);
    const past     = tides.filter(t=>new Date(t.t)<=new Date());
    const lastT    = past[past.length-1];
    const nextT    = tides.find(t=>new Date(t.t)>new Date());
    let tidePct=50;
    if (lastT&&nextT) {
      const nowD=new Date(), frac=(nowD-new Date(lastT.t))/(new Date(nextT.t)-new Date(lastT.t));
      const cur2=parseFloat(lastT.v)+(parseFloat(nextT.v)-parseFloat(lastT.v))*frac;
      const vals=tides.map(t=>parseFloat(t.v));
      tidePct=Math.min(100,Math.max(0,(cur2-Math.min(...vals))/(Math.max(...vals)-Math.min(...vals))*100));
    }

    // ── Hourly ──
    let hourSlots=[];
    if (d.om?.marine?.hourly) {
      const mh=d.om.marine.hourly, wh=d.om.wind?.hourly;
      const ni=getNowIdx(mh.time);
      for (let i=ni;i<Math.min(ni+8,mh.time.length);i++) {
        const adjHt=(mh.wave_height[i]||0)*d.mult;
        hourSlots.push({
          time: mh.time[i],
          htM:  adjHt,
          ftStr:mToFt(adjHt),
          sp:   mh.swell_wave_period?.[i]||0,
          ws:   wh?.wind_speed_10m?.[i]||0,
          wd:   wh?.wind_direction_10m?.[i],
        });
      }
    }

    wrap.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="spot-title">${sp.name}</div>
          <div class="src-badge">${dataSource} · ${dataSource==='OPEN-METEO'?Math.round(d.mult*100)+'% NEARSHORE ADJ':'NEARSHORE MODEL'}</div>
        </div>
        <div class="rating-pill" style="color:${rc(rating)}">${(rating||'–').toUpperCase()}</div>
      </div>

      <div class="hero">
        <div>
          <div class="wave-big">${htStr}<span class="wave-unit">ft</span></div>
          <div class="wave-human">${humanHt(htM)}</div>
        </div>
        <div class="swell-col">
          ${swellFt ? `<div class="swell-row"><div class="sw-l">SWELL</div><div class="sw-v">${swellFt}ft @ ${swellPd?.toFixed?swellPd.toFixed(0):swellPd||'–'}s</div><div class="sw-d">${wdir(swellDirDeg)}</div></div>` : ''}
          <div class="swell-row"><div class="sw-l">WIND</div><div class="sw-v">${windKt}kt ${windDirStr}</div><div class="sw-d">${gustKt?'↑'+gustKt+'kt':''}</div></div>
        </div>
      </div>

      <div class="dgrid">
        <div class="dcell"><div class="dl">WIND</div><div class="dv">${windKt}<span class="du">kt</span></div><div class="ds">${windDirStr}${gustKt?' ↑'+gustKt+'kt':''}</div></div>
        <div class="dcell"><div class="dl">PERIOD</div><div class="dv">${swellPd!=null?(typeof swellPd==='number'?swellPd.toFixed(0):swellPd):'–'}<span class="du">s</span></div><div class="ds">${wdir(swellDirDeg)}</div></div>
        <div class="dcell"><div class="dl">SWELL</div><div class="dv">${swellFt||'–'}<span class="du">ft</span></div><div class="ds">${wdir(swellDirDeg)}</div></div>
      </div>

      <div class="tides-sec">
        <div class="dl">TODAY'S TIDES — NOAA</div>
        <div class="tide-bar">
          <div class="tb-bg"></div>
          <div class="tb-fill" style="width:${tidePct}%"></div>
          <div class="tb-dot" style="left:${tidePct}%"></div>
        </div>
        ${upcoming.map(t=>`
          <div class="tide-row">
            <div class="tt" style="color:${t.type==='H'?'#29d9f5':'rgba(216,240,247,0.4)'}">${t.type==='H'?'HIGH':'LOW'}</div>
            <div class="ttv">${fmtTime(t.t)}</div>
            <div class="tht">${parseFloat(t.v).toFixed(1)} ft</div>
          </div>`).join('')||'<div style="font-family:monospace;font-size:10px;color:rgba(216,240,247,0.3)">No tide data</div>'}
      </div>

      <div class="hourly-sec">
        <div class="dl">NEXT 24 HRS</div>
        <div class="hscroll">
          ${hourSlots.map((h,i)=>`
            <div class="hchip ${i===0?'now':''}">
              <div class="h-t">${i===0?'NOW':fmtHour(h.time)}</div>
              <div class="h-h">${h.ftStr}ft</div>
              <div class="h-w">${msToKt(h.ws)}kt ${wdir(h.wd)}</div>
              <div class="h-d" style="background:${rc(ratingStr(h.htM,h.sp,h.ws))}"></div>
            </div>`).join('')||'<div style="font-family:monospace;font-size:10px;color:rgba(216,240,247,0.3)">–</div>'}
        </div>
      </div>
    </div>`;

  } catch(e) {
    wrap.innerHTML=`<div class="card"><div class="err">⚠ ${e.message}<br><br>Check your connection and reload.</div></div>`;
  }
}

renderCard(0);
</script>
</body>
</html>
