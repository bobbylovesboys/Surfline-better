<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SB SURF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #0a4f6e;
    --deep: #041c2c;
    --ink: #060f17;
    --foam: #d8f0f7;
    --sand: #c9a96e;
    --kelp: #2a7c4e;
    --fire: #f4623a;
    --glow: #29d9f5;
    --mist: rgba(255,255,255,0.06);
    --poor: #e05e3a;
    --fair: #e8b84b;
    --good: #3dbe7a;
    --epic: #29d9f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--foam);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated ocean background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,79,110,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 20% 80%, rgba(41,217,245,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* HEADER */
  header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--foam);
    line-height: 1;
  }

  .logo span {
    color: var(--glow);
    text-shadow: 0 0 20px rgba(41,217,245,0.5);
  }

  .date-time {
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(216,240,247,0.5);
    line-height: 1.6;
  }

  /* SPOT TABS */
  .spot-tabs {
    display: flex;
    gap: 6px;
    padding: 20px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .spot-tabs::-webkit-scrollbar { display: none; }

  .spot-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 3px;
    border: 1px solid rgba(216,240,247,0.12);
    background: var(--mist);
    color: rgba(216,240,247,0.5);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .spot-tab.active {
    background: var(--glow);
    color: var(--ink);
    border-color: var(--glow);
    box-shadow: 0 0 16px rgba(41,217,245,0.3);
  }

  .spot-tab:not(.active):hover {
    border-color: rgba(216,240,247,0.3);
    color: var(--foam);
  }

  /* MAIN CARD */
  .main-card {
    margin: 16px 20px 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(216,240,247,0.1);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 16px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid rgba(216,240,247,0.08);
  }

  .spot-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .rating-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 5px 10px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    border: 1px solid currentColor;
  }

  .rating-poor   { color: var(--poor);  border-color: var(--poor);  }
  .rating-fair   { color: var(--fair);  border-color: var(--fair);  }
  .rating-good   { color: var(--good);  border-color: var(--good);  }
  .rating-epic   { color: var(--epic);  border-color: var(--epic);  }

  /* BIG WAVE NUMBER */
  .hero-stats {
    padding: 18px 18px 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 20px;
    border-bottom: 1px solid rgba(216,240,247,0.08);
  }

  .wave-height-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--foam);
    letter-spacing: -2px;
  }

  .wave-height-big .unit {
    font-size: 22px;
    color: rgba(216,240,247,0.4);
    letter-spacing: 1px;
  }

  .wave-human {
    font-size: 12px;
    color: rgba(216,240,247,0.45);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .swell-stack {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .swell-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .swell-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(216,240,247,0.35);
    letter-spacing: 1px;
    width: 28px;
    text-transform: uppercase;
  }

  .swell-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--glow);
  }

  .swell-dir {
    font-size: 10px;
    color: rgba(216,240,247,0.5);
  }

  /* DATA GRID */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid rgba(216,240,247,0.08);
  }

  .data-cell {
    padding: 14px 16px;
    border-right: 1px solid rgba(216,240,247,0.08);
  }

  .data-cell:last-child { border-right: none; }

  .data-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(216,240,247,0.35);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .data-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--foam);
    line-height: 1;
  }

  .data-sub {
    font-size: 10px;
    color: rgba(216,240,247,0.4);
    margin-top: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* TIDES */
  .tides-section {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(216,240,247,0.08);
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(216,240,247,0.3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .tide-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .tide-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(216,240,247,0.5);
  }

  .tide-type.high { color: var(--glow); }
  .tide-type.low  { color: rgba(216,240,247,0.4); }

  .tide-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 1px;
    color: var(--foam);
  }

  .tide-ht {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(216,240,247,0.5);
    text-align: right;
    min-width: 50px;
  }

  /* tide bar viz */
  .tide-bar-wrap {
    position: relative;
    height: 32px;
    margin: 10px 0 4px;
  }

  .tide-bar-bg {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
  }

  .tide-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--ocean), var(--glow));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .tide-cursor {
    position: absolute;
    bottom: -2px;
    width: 8px;
    height: 8px;
    background: var(--glow);
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--glow);
  }

  /* HOURLY */
  .hourly-section {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(216,240,247,0.08);
  }

  .hourly-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }

  .hour-chip {
    flex-shrink: 0;
    width: 62px;
    padding: 10px 0;
    text-align: center;
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(216,240,247,0.08);
  }

  .hour-chip.now {
    border-color: var(--glow);
    background: rgba(41,217,245,0.07);
  }

  .hour-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(216,240,247,0.4);
    margin-bottom: 5px;
  }

  .hour-ht {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--foam);
    margin-bottom: 4px;
    line-height: 1;
  }

  .hour-wind {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(216,240,247,0.4);
  }

  .hour-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin: 5px auto 0;
  }

  /* FORECASTER NOTE */
  .note-section {
    padding: 14px 18px;
  }

  .note-text {
    font-size: 12px;
    line-height: 1.65;
    color: rgba(216,240,247,0.55);
    font-style: italic;
    border-left: 2px solid rgba(41,217,245,0.3);
    padding-left: 12px;
  }

  /* SURFLINE LINK */
  .surfline-link {
    display: block;
    text-align: center;
    padding: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(216,240,247,0.25);
    text-decoration: none;
    border-top: 1px solid rgba(216,240,247,0.06);
  }
  .surfline-link:hover { color: var(--glow); }

  /* LOADING / ERROR */
  .loading-state {
    padding: 40px 20px;
    text-align: center;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid rgba(41,217,245,0.15);
    border-top-color: var(--glow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(216,240,247,0.35);
  }

  .error-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--poor);
    letter-spacing: 1px;
    padding: 16px 18px;
  }

  /* OVERVIEW ROW */
  .overview-row {
    display: flex;
    gap: 8px;
    padding: 14px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .overview-row::-webkit-scrollbar { display: none; }

  .overview-chip {
    flex-shrink: 0;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(216,240,247,0.08);
    border-radius: 3px;
    cursor: pointer;
    min-width: 100px;
    transition: all 0.2s;
  }

  .overview-chip:hover { border-color: rgba(216,240,247,0.2); }

  .ov-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: rgba(216,240,247,0.7);
    margin-bottom: 4px;
  }

  .ov-ht {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--foam);
    line-height: 1;
  }

  .ov-rating {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Stars */
  .stars { letter-spacing: 1px; font-size: 10px; }
  .star-filled { color: var(--sand); }
  .star-empty  { color: rgba(216,240,247,0.15); }

  /* Wind arrow */
  .wind-arrow {
    display: inline-block;
    font-size: 14px;
    transition: transform 0.5s ease;
  }

  /* section divider label */
  .section-head {
    padding: 18px 20px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(216,240,247,0.25);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="wrapper">

  <header>
    <div class="logo">SB<span>·</span>SURF</div>
    <div class="date-time" id="dateTime"></div>
  </header>

  <div class="section-head">OVERVIEW</div>
  <div class="overview-row" id="overviewRow">
    <!-- populated by JS -->
  </div>

  <div class="section-head">SPOT DETAIL</div>
  <div class="spot-tabs" id="spotTabs"></div>

  <div id="mainContent"></div>

</div>

<script>
const SPOTS = [
  { name: "BRUCE'S",    id: "61c376003cf37564c0eb8125", lat: 33.8988, lon: -118.4152 },
  { name: "MAN PIER",   id: "5842041f4e65fad6a7708907", lat: 33.8843, lon: -118.4090 },
  { name: "HERMOSA",    id: "5b17281e4a274e001a11fcc3", lat: 33.8619, lon: -118.4002 },
  { name: "RAT BEACH",  id: "640a3f804eb375e33a945550", lat: 33.8110, lon: -118.3942 },
  { name: "TOPAZ",      id: "584204214e65fad6a7709d0b", lat: 33.8412, lon: -118.3996 },
];

const NOAA_STATION = "9410660"; // LA/Long Beach - closest to South Bay

let activeSpot = 0;
let cache = {};

// Date/time
function updateClock() {
  const now = new Date();
  document.getElementById('dateTime').innerHTML =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) + '<br>' +
    now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

// Build tabs
const tabsEl = document.getElementById('spotTabs');
SPOTS.forEach((s, i) => {
  const t = document.createElement('button');
  t.className = 'spot-tab' + (i === 0 ? ' active' : '');
  t.textContent = s.name;
  t.onclick = () => selectSpot(i);
  tabsEl.appendChild(t);
});

function selectSpot(i) {
  activeSpot = i;
  document.querySelectorAll('.spot-tab').forEach((t, j) => {
    t.classList.toggle('active', i === j);
  });
  renderSpot(i);
}

// Rating helpers
function ratingClass(r) {
  if (!r) return '';
  const l = r.toLowerCase();
  if (l.includes('epic'))         return 'rating-epic';
  if (l.includes('good'))         return 'rating-good';
  if (l.includes('fair'))         return 'rating-fair';
  return 'rating-poor';
}

function ratingColor(r) {
  if (!r) return 'rgba(216,240,247,0.4)';
  const l = r.toLowerCase();
  if (l.includes('epic')) return '#29d9f5';
  if (l.includes('good')) return '#3dbe7a';
  if (l.includes('fair')) return '#e8b84b';
  return '#e05e3a';
}

function starsHtml(score, max = 5) {
  let h = '';
  for (let i = 1; i <= max; i++) {
    h += `<span class="${i <= score ? 'star-filled' : 'star-empty'}">★</span>`;
  }
  return h;
}

function dirToArrow(deg) {
  if (deg === undefined || deg === null) return '·';
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  return arrows[Math.round(deg / 45) % 8];
}

function windDirLabel(deg) {
  if (deg === undefined || deg === null) return '–';
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function humanHeight(ft) {
  if (!ft) return '–';
  const avg = (ft.min + ft.max) / 2;
  if (avg < 1.5) return 'KNEE–THIGH';
  if (avg < 2.5) return 'THIGH–WAIST';
  if (avg < 3.5) return 'WAIST–CHEST';
  if (avg < 4.5) return 'CHEST–HEAD';
  if (avg < 6)   return 'OVERHEAD';
  return 'DOUBLE UP';
}

// Fetch Surfline data
async function fetchSurfline(spotId, days = 1) {
  const key = `${spotId}_${days}`;
  if (cache[key]) return cache[key];

  const base = 'https://services.surfline.com/kbyg/spots/forecasts';
  const params = `?spotId=${spotId}&days=${days}&intervalHours=3&cacheEnabled=true&units%5BswellHeight%5D=FT&units%5BwaveHeight%5D=FT&units%5BwindSpeed%5D=KTS&units%5BtideHeight%5D=FT`;

  const [waveRes, windRes, tideRes, condRes] = await Promise.allSettled([
    fetch(`${base}/wave${params}`).then(r => r.json()),
    fetch(`${base}/wind${params}`).then(r => r.json()),
    fetch(`${base}/tides${params}&days=2`).then(r => r.json()),
    fetch(`${base}/conditions${params}`).then(r => r.json()),
  ]);

  const data = {
    wave:  waveRes.status  === 'fulfilled' ? waveRes.value  : null,
    wind:  windRes.status  === 'fulfilled' ? windRes.value  : null,
    tides: tideRes.status  === 'fulfilled' ? tideRes.value  : null,
    cond:  condRes.status  === 'fulfilled' ? condRes.value  : null,
  };

  cache[key] = data;
  return data;
}

// Fetch NOAA tides as fallback
async function fetchNOAATides() {
  const now = new Date();
  const fmt = d => d.toISOString().slice(0,10).replace(/-/g,'');
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=${NOAA_STATION}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=sb_surf&format=json&begin_date=${fmt(now)}&end_date=${fmt(tomorrow)}`;
  try {
    const r = await fetch(url);
    const j = await r.json();
    return j.predictions || [];
  } catch { return []; }
}

// Fetch Open-Meteo as extended fallback
async function fetchOpenMeteo(lat, lon) {
  const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,swell_wave_height,swell_wave_period,swell_wave_direction,wind_wave_height&wind_speed_unit=kn&length_unit=imperial&timezone=America%2FLos_Angeles&forecast_days=7`;
  try {
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

async function renderOverview() {
  const row = document.getElementById('overviewRow');
  row.innerHTML = SPOTS.map((s, i) => `
    <div class="overview-chip" onclick="selectSpot(${i})">
      <div class="ov-name">${s.name}</div>
      <div class="ov-ht" id="ov-ht-${i}"><span style="font-size:11px;color:rgba(216,240,247,0.3)">···</span></div>
      <div class="ov-rating" id="ov-rt-${i}"></div>
    </div>
  `).join('');

  // load each spot quickly
  SPOTS.forEach(async (s, i) => {
    try {
      const data = await fetchSurfline(s.id, 1);
      const waves = data?.wave?.data?.wave;
      const now = Date.now() / 1000;
      if (waves && waves.length) {
        const closest = waves.reduce((a, b) => Math.abs(b.timestamp - now) < Math.abs(a.timestamp - now) ? b : a);
        const ht = closest.surf;
        const rating = closest.surf?.humanRelation || '';
        const htEl = document.getElementById(`ov-ht-${i}`);
        const rtEl = document.getElementById(`ov-rt-${i}`);
        if (htEl) htEl.innerHTML = `${ht.min}–${ht.max}<span style="font-size:11px;color:rgba(216,240,247,0.4)">ft</span>`;
        if (rtEl) {
          rtEl.style.color = ratingColor(rating);
          rtEl.textContent = rating.toUpperCase();
        }
      }
    } catch {}
  });
}

async function renderSpot(idx) {
  const spot = SPOTS[idx];
  const el = document.getElementById('mainContent');
  el.innerHTML = `<div class="main-card"><div class="loading-state"><div class="spinner"></div><div class="loading-text">PULLING CONDITIONS</div></div></div>`;

  try {
    const [data, noaaTides] = await Promise.all([
      fetchSurfline(spot.id, 2),
      fetchNOAATides()
    ]);

    const now = Date.now() / 1000;
    const waves = data?.wave?.data?.wave || [];
    const winds = data?.wind?.data?.wind || [];
    const tides = data?.tides?.data?.tides || [];
    const cond  = data?.cond?.data?.conditions;

    // current wave snapshot
    const curWave = waves.length ? waves.reduce((a, b) => Math.abs(b.timestamp - now) < Math.abs(a.timestamp - now) ? b : a) : null;
    const curWind = winds.length ? winds.reduce((a, b) => Math.abs(b.timestamp - now) < Math.abs(a.timestamp - now) ? b : a) : null;

    const ht    = curWave?.surf || { min: 0, max: 0 };
    const swells = curWave?.swells?.filter(s => s.height > 0) || [];
    const rating = cond?.value || curWave?.surf?.humanRelation || 'UNKNOWN';
    const ratingStr = typeof rating === 'string' ? rating : (rating?.am || 'UNKNOWN');

    // tides (prefer Surfline, fallback NOAA)
    const tideEntries = tides.filter(t => t.type !== 'NORMAL').slice(0, 6);

    // next tide
    const upcomingTides = tideEntries.filter(t => t.timestamp > now);
    const curTideEntry  = tides.filter(t => t.type === 'NORMAL').reduce((a, b) =>
      Math.abs(b.timestamp - now) < Math.abs(a.timestamp - now) ? b : a, tides[0] || {});
    const curTideHt = curTideEntry?.height?.toFixed(1) || '–';

    // hourly for next 24h
    const hourlyWaves = waves.filter(w => w.timestamp >= now && w.timestamp <= now + 86400).slice(0, 8);
    const hourlyWinds = winds.filter(w => w.timestamp >= now && w.timestamp <= now + 86400).slice(0, 8);

    // tide bar pct (rough)
    const todayTidesRaw = tideEntries.filter(t => {
      const d = new Date(t.timestamp * 1000);
      const n = new Date();
      return d.getDate() === n.getDate();
    });
    const heights = tides.filter(t => t.type === 'NORMAL').map(t => t.height);
    const minH = Math.min(...heights, 0);
    const maxH = Math.max(...heights, 6);
    const tidePct = ((curTideEntry?.height || 0) - minH) / (maxH - minH) * 100;

    // forecaster note
    const noteAm = cond?.am?.observation || cond?.observation || '';
    const notePm = cond?.pm?.observation || '';
    const noteText = noteAm || notePm || 'No forecaster notes available.';

    el.innerHTML = `
    <div class="main-card" style="animation: fadeUp 0.35s ease both;">
      <div class="card-header">
        <div>
          <div class="spot-name">${spot.name}</div>
          <div class="stars" style="margin-top:4px">${starsHtml(Math.round((ht.min + ht.max)/2))}</div>
        </div>
        <div class="rating-badge ${ratingClass(ratingStr)}">${ratingStr.toUpperCase()}</div>
      </div>

      <div class="hero-stats">
        <div>
          <div class="wave-height-big">${ht.min}–${ht.max}<span class="unit">ft</span></div>
          <div class="wave-human">${humanHeight(ht)}</div>
        </div>
        <div class="swell-stack">
          ${swells.slice(0,3).map((s, i) => `
            <div class="swell-row">
              <div class="swell-label">SW${i+1}</div>
              <div class="swell-val">${s.height.toFixed(1)}ft @ ${s.period}s</div>
              <div class="swell-dir">${dirToArrow(s.direction)} ${windDirLabel(s.direction)}</div>
            </div>
          `).join('') || '<div class="swell-val" style="font-size:11px;opacity:0.4">no swell data</div>'}
        </div>
      </div>

      <div class="data-grid">
        <div class="data-cell">
          <div class="data-label">WIND</div>
          <div class="data-val">${curWind ? Math.round(curWind.speed) : '–'}<span style="font-size:12px;opacity:0.5">kt</span></div>
          <div class="data-sub">
            <span class="wind-arrow" style="transform:rotate(${curWind?.direction || 0}deg)">${dirToArrow(curWind?.direction)}</span>
            ${windDirLabel(curWind?.direction)} ${curWind?.gust ? '↑' + Math.round(curWind.gust) + 'kt' : ''}
          </div>
        </div>
        <div class="data-cell">
          <div class="data-label">TIDE NOW</div>
          <div class="data-val">${curTideHt}<span style="font-size:12px;opacity:0.5">ft</span></div>
          <div class="data-sub">
            ${upcomingTides[0] ? (upcomingTides[0].type + ' ' + new Date(upcomingTides[0].timestamp*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})) : '–'}
          </div>
        </div>
        <div class="data-cell">
          <div class="data-label">PERIOD</div>
          <div class="data-val">${swells[0]?.period || '–'}<span style="font-size:12px;opacity:0.5">s</span></div>
          <div class="data-sub">${swells[0] ? windDirLabel(swells[0].direction) + ' @ ' + swells[0].height.toFixed(1) + 'ft' : '–'}</div>
        </div>
      </div>

      <!-- TIDES -->
      <div class="tides-section">
        <div class="section-label">TODAY'S TIDES</div>
        <div class="tide-bar-wrap">
          <div class="tide-bar-bg"></div>
          <div class="tide-bar-fill" style="width:${Math.min(100,Math.max(0,tidePct))}%"></div>
          <div class="tide-cursor" style="left:${Math.min(100,Math.max(0,tidePct))}%"></div>
        </div>
        ${upcomingTides.slice(0,4).map(t => `
          <div class="tide-row">
            <div class="tide-type ${t.type === 'HIGH' ? 'high' : 'low'}">${t.type}</div>
            <div class="tide-time">${new Date(t.timestamp*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>
            <div class="tide-ht">${t.height?.toFixed(1) || '–'} ft</div>
          </div>
        `).join('') || '<div style="font-size:11px;color:rgba(216,240,247,0.3);font-family:Share Tech Mono">No tide data</div>'}
      </div>

      <!-- HOURLY -->
      <div class="hourly-section">
        <div class="section-label">NEXT 24 HRS</div>
        <div class="hourly-scroll">
          ${hourlyWaves.map((w, i) => {
            const wind = hourlyWinds[i];
            const t = new Date(w.timestamp * 1000);
            const isNow = i === 0;
            const dotColor = ratingColor(w.surf?.humanRelation || '');
            return `
              <div class="hour-chip ${isNow ? 'now' : ''}">
                <div class="hour-time">${isNow ? 'NOW' : t.toLocaleTimeString('en-US',{hour:'numeric',hour12:true})}</div>
                <div class="hour-ht">${w.surf.min}–${w.surf.max}</div>
                <div class="hour-wind">${wind ? Math.round(wind.speed)+'kt '+windDirLabel(wind.direction) : '–'}</div>
                <div class="hour-dot" style="background:${dotColor}"></div>
              </div>
            `;
          }).join('') || '<div class="loading-text">no hourly data</div>'}
        </div>
      </div>

      <!-- FORECASTER NOTE -->
      <div class="note-section">
        <div class="section-label">FORECASTER</div>
        <div class="note-text">${noteText}</div>
      </div>

      <a class="surfline-link" href="https://www.surfline.com/surf-report/${spot.name.toLowerCase().replace(/[^a-z]/g,'-')}/${spot.id}" target="_blank" rel="noopener">
        VIEW ON SURFLINE →
      </a>
    </div>`;

  } catch (err) {
    el.innerHTML = `<div class="main-card"><div class="error-text">⚠ COULD NOT LOAD — ${err.message}</div></div>`;
  }
}

// Init
renderOverview();
renderSpot(0);
</script>
</body>
</html>
